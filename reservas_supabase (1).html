<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Brunch — Mesas Mecánica</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0c; --bg-soft:#131318; --card:#181820; --card-hover:#1f1f29;
  --border:#2a2a36; --border-soft:#1f1f2a;
  --text:#f5f5f7; --muted:#8e8e9c;
  --gold:#f5c542; --gold-soft:rgba(245,197,66,0.15);
  --green:#4ade80; --green-soft:rgba(74,222,128,0.15);
  --red:#f87171; --red-soft:rgba(248,113,113,0.15);
  --blue:#60a5fa; --blue-soft:rgba(96,165,250,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'JetBrains Mono',ui-monospace,monospace;}
body{background:radial-gradient(1200px 600px at 0% 0%,rgba(245,197,66,0.07),transparent 60%),radial-gradient(900px 500px at 100% 100%,rgba(96,165,250,0.05),transparent 60%),var(--bg);background-attachment:fixed;}

/* BRAND BAR */
.brand-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border-soft);background:rgba(10,10,12,0.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:12px;}
.logo{width:36px;height:36px;border:1px solid var(--gold);color:var(--gold);display:grid;place-items:center;font-weight:700;border-radius:6px;background:var(--gold-soft);font-size:13px;}
.brand-title{font-size:13px;letter-spacing:0.16em;text-transform:uppercase;}
.brand-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.08em;}
.user-chip{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
.user-chip strong{color:var(--text);}
.admin-badge{font-size:9px;color:var(--gold);letter-spacing:0.1em;margin-left:6px;}

/* WRAP */
.wrap{max-width:960px;margin:0 auto;padding:20px 16px 80px;}

/* TABS */
.tabs{display:flex;gap:4px;margin:20px 0 6px;border-bottom:1px solid var(--border-soft);}
.tab{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--muted);padding:10px 14px;font-family:inherit;font-size:12px;letter-spacing:0.08em;cursor:pointer;text-transform:uppercase;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

h1{font-size:24px;font-weight:600;margin:16px 0 4px;letter-spacing:-0.01em;}
h2{font-size:16px;font-weight:600;margin:20px 0 10px;}
.page-sub{color:var(--muted);margin:0 0 20px;font-size:12px;letter-spacing:0.04em;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border-soft);border-radius:10px;padding:20px;margin-bottom:14px;}
.card-title{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}

/* INPUTS */
label{display:block;font-size:11px;color:var(--muted);margin:12px 0 5px;letter-spacing:0.04em;}
input,select,textarea{width:100%;background:var(--bg-soft);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:inherit;font-size:13px;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--gold);}
input::placeholder{color:#5a5a6a;}
select option{background:#1a1a22;}
textarea{resize:vertical;min-height:60px;}

/* FILE INPUT */
.file-label{display:flex;align-items:center;gap:10px;background:var(--bg-soft);border:1px dashed var(--border);border-radius:8px;padding:14px;cursor:pointer;font-size:12px;color:var(--muted);transition:border-color .15s;}
.file-label:hover{border-color:var(--gold);color:var(--gold);}
.file-label input{display:none;}
.img-preview{width:100%;max-height:180px;object-fit:contain;border-radius:8px;margin-top:10px;border:1px solid var(--border);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;border-radius:8px;border:1px solid transparent;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:0.04em;cursor:pointer;transition:transform .08s,background .15s,border-color .15s,color .15s;}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-primary{background:var(--gold);color:#1a1300;}
.btn-primary:hover{background:#ffd45a;}
.btn-outline{background:transparent;border-color:var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:transparent;border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-soft);}
.btn-ghost{background:transparent;color:var(--muted);}
.btn-ghost:hover{color:var(--text);}
.btn-wa{background:#25d366;color:#062b13;border-color:#25d366;}
.btn-wa:hover{background:#4ee084;}
.btn-full{width:100%;}
.btn-sm{padding:7px 12px;font-size:11px;}

/* ALERTS */
.alert{padding:11px 13px;border-radius:8px;font-size:12px;margin:8px 0;border:1px solid;}
.alert-ok{background:var(--green-soft);border-color:rgba(74,222,128,.4);color:#b8f5cf;}
.alert-warn{background:var(--gold-soft);border-color:rgba(245,197,66,.4);color:#f5d97a;}
.alert-err{background:var(--red-soft);border-color:rgba(248,113,113,.4);color:#fbb4b4;}

/* RADIO */
.radio-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.radio-opt{padding:13px;border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;font-size:12px;transition:all .15s;}
.radio-opt:hover{border-color:var(--gold);}
.radio-opt.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}

/* STEPS */
.steps{display:flex;align-items:center;margin-bottom:16px;}
.step{display:flex;align-items:center;flex:1;}
.step:last-child{flex:0;}
.step-dot{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg-soft);display:grid;place-items:center;font-size:12px;color:var(--muted);font-weight:600;flex-shrink:0;}
.step-dot.active{background:var(--gold);color:#1a1300;border-color:var(--gold);}
.step-dot.done{background:var(--green-soft);color:var(--green);border-color:var(--green);}
.step-line{flex:1;height:1px;background:var(--border);margin:0 6px;}
.step-line.done{background:var(--gold);}

/* MAPA */
.zona-header{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;padding-left:2px;}
.mapa-zone{display:grid;gap:7px;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));margin-bottom:4px;}
.mesa-cell{aspect-ratio:1.15/1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;border:1px solid var(--border);background:var(--bg-soft);color:var(--text);position:relative;transition:transform .1s,border-color .15s;}
.mesa-cell .zt{position:absolute;top:3px;left:5px;font-size:7px;letter-spacing:0.06em;color:var(--muted);font-weight:500;}
.mesa-cell:hover:not(.disabled):not(.ocupada):not(.pendiente){transform:translateY(-2px);border-color:var(--gold);}
.mesa-cell.libre{border-color:rgba(74,222,128,.5);color:var(--green);background:var(--green-soft);cursor:pointer;}
.mesa-cell.ocupada{border-color:rgba(248,113,113,.5);color:var(--red);background:var(--red-soft);cursor:not-allowed;}
.mesa-cell.pendiente{border-color:rgba(245,197,66,.6);color:var(--gold);background:var(--gold-soft);cursor:not-allowed;}
.mesa-cell.disabled,.mesa-cell.deshabilitada{background:#0e0e13;color:#3a3a47;border-color:var(--border-soft);cursor:not-allowed;}
.mesa-cell.selected{box-shadow:0 0 0 2px var(--gold);transform:translateY(-2px);}
.mesa-cell.mine{box-shadow:0 0 0 2px var(--blue);}
.mesa-cell.toggle-off{background:#0e0e13;color:#6a6a78;border-style:dashed;cursor:pointer;}

.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;font-size:11px;color:var(--muted);}
.legend-item{display:flex;align-items:center;gap:5px;}
.ld{width:10px;height:10px;border-radius:3px;border:1px solid;}
.ld-free{background:var(--green-soft);border-color:var(--green);}
.ld-taken{background:var(--red-soft);border-color:var(--red);}
.ld-pend{background:var(--gold-soft);border-color:var(--gold);}
.ld-dis{background:#0e0e13;border-color:var(--border-soft);}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card);border:1px solid var(--border-soft);border-radius:10px;padding:16px;text-align:center;}
.stat-num{font-size:26px;font-weight:700;}
.stat-num.g{color:var(--green);} .stat-num.r{color:var(--red);} .stat-num.gold{color:var(--gold);}
.stat-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* PERSONA ROW */
.persona-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px 12px;background:var(--bg-soft);border-radius:8px;margin-bottom:7px;border:1px solid var(--border-soft);}
.persona-name{font-size:13px;font-weight:500;}
.persona-meta{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.04em;}
.badge{font-size:9px;padding:3px 8px;border-radius:99px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;}
.badge.candidato{background:var(--gold-soft);color:var(--gold);}
.badge.paga{background:var(--green-soft);color:var(--green);}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.progress-bar{height:5px;background:var(--bg-soft);border-radius:99px;overflow:hidden;margin-top:8px;border:1px solid var(--border-soft);}
.progress-fill{height:100%;background:var(--gold);transition:width .3s;}
hr{border:0;border-top:1px solid var(--border-soft);margin:16px 0;}

/* REQ ROW */
.req-row{background:var(--card);border:1px solid var(--border-soft);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.req-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.req-mesa{font-size:20px;font-weight:700;color:var(--gold);}
.req-status{font-size:10px;padding:4px 10px;border-radius:99px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;}
.req-status.pendiente{background:var(--gold-soft);color:var(--gold);}
.req-status.aprobada{background:var(--green-soft);color:var(--green);}
.req-status.rechazada{background:var(--red-soft);color:var(--red);}

.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}

/* AUTH */
.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;}
.auth-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border-soft);border-radius:12px;padding:28px;}
.auth-tabs{display:flex;gap:4px;margin-bottom:20px;padding:4px;background:var(--bg-soft);border-radius:8px;}
.auth-tabs button{flex:1;background:transparent;border:0;color:var(--muted);padding:9px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;letter-spacing:.04em;transition:all .15s;}
.auth-tabs button.active{background:var(--gold);color:#1a1300;font-weight:600;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:grid;place-items:center;z-index:200;padding:20px;}
.modal{background:var(--card);border:1px solid var(--border-soft);border-radius:12px;padding:22px;width:100%;max-width:440px;}

/* COMPROBANTE IMG */
.comp-thumb{width:100%;max-height:160px;object-fit:contain;border-radius:6px;border:1px solid var(--border);margin-top:8px;cursor:pointer;}

@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:560px){
  .row2{grid-template-columns:1fr;}
  .stat-grid{grid-template-columns:repeat(3,1fr);}
  .brand-title{font-size:11px;}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const ADMINS = [
  {nombre:'Diego Salinas',   telefono:'2225306300'},
  {nombre:'Luis Félix',      telefono:'8116007660'},
  {nombre:'Marcelo Padilla', telefono:'8446062882'},
  {nombre:'Sayra Taray',     telefono:'9932107382'},
  {nombre:'Zuceth Mendoza',  telefono:'8443921890'},
];
const DEFAULT_PASS = 'mecanica2024';
const MIN_P = 8, MAX_P = 12;
const PAYMENT_LINK = 'https://www.moneypool.mx/p/dnR8WQE';

const ZONES = [
  {name:'Espacio DJ',       mesas:[2,3,4,5,6]},
  {name:'Segundo Anillo',   mesas:[10,11,12,13,14,15,16]},
  {name:'Primer Anillo',    mesas:[20,21,22,23,24,25]},
  {name:'Mesas en Pista A', mesas:[31,32,33,34,35,36]},
  {name:'Mesas en Pista B', mesas:[41,42,43,44,45,46]},
  {name:'Primer Anillo B',  mesas:[50,51,52,53,54,55]},
  {name:'Segundo Anillo B', mesas:[60,61,62,63,64,65]},
];
const ALL_MESAS = ZONES.flatMap(z=>z.mesas);
const ZONA_MAP = {};
ZONES.forEach(z=>z.mesas.forEach(m=>ZONA_MAP[m]=z.name));
const ENABLED_DEFAULT = new Set([2,3,20,21,22,23,24,25,31,32,33,34,35,36]);

// ============================================================
//  SUPABASE
// ============================================================
const SUPABASE_URL = 'https://opxobvnqsvmymtwkzvee.supabase.co';
const SUPABASE_KEY = 'sb_publishable__NtljfSvemzO2jQG1T5vSw_0o3FZL5a';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
//  UTILS
// ============================================================
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function now(){ return new Date().toLocaleString('es-MX'); }
function norm(p){ return (p||'').replace(/\D/g,''); }
function hash(p){ let h=0; for(let c of p){h=(h<<5)-h+c.charCodeAt(0);h|=0;} return String(h); }
function waLink(tel,msg){ const c=norm(tel); const f=c.length===10?`52${c}`:c; return `https://wa.me/${f}?text=${encodeURIComponent(msg)}`; }
function v(id){ const e=document.getElementById(id); return e?e.value.trim():''; }

// ============================================================
//  SESSION (solo sessionStorage para saber quién está logueado)
// ============================================================
let currentUser = null;
try{ const u=sessionStorage.getItem('wb_user'); if(u) currentUser=JSON.parse(u); }catch{}

// ============================================================
//  RENDER ENGINE
// ============================================================
const app = document.getElementById('app');
function render(html){ app.innerHTML=html; }
function loading(msg='Cargando...'){
  render(`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--muted)">
    <div style="width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="font-size:12px;letter-spacing:.06em">${msg}</div>
  </div>`);
}

// ============================================================
//  ROUTER
// ============================================================
let currentTab = 'reserva';
function route(){
  if(!currentUser){ renderAuth(); return; }
  renderMain();
}

// ============================================================
//  AUTH
// ============================================================
function renderAuth(mode='login'){
  render(`
  <div class="auth-wrap">
    <div class="auth-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div class="logo" style="width:44px;height:44px;font-size:16px">WB</div>
        <div>
          <div style="font-size:18px;font-weight:600">World Brunch</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:2px">GAME ON · MUNDIAL · 13 JUN 2026</div>
        </div>
      </div>
      <div class="auth-tabs">
        <button onclick="renderAuth('login')" class="${mode==='login'?'active':''}">Iniciar sesión</button>
        <button onclick="renderAuth('register')" class="${mode==='register'?'active':''}">Registrarme</button>
      </div>
      <div id="auth-err"></div>
      ${mode==='register'?`<label>Nombre completo</label><input id="a-nombre" placeholder="Juan García López">`:''}
      <label>Teléfono (10 dígitos)</label>
      <input id="a-tel" placeholder="222 530 6300" type="tel">
      <label>Contraseña</label>
      <input id="a-pass" type="password" placeholder="Mín. 6 caracteres">
      <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="${mode==='login'?'doLogin()':'doRegister()'}">
        ${mode==='login'?'Entrar':'Crear cuenta'}
      </button>
    </div>
  </div>`);
}

async function doLogin(){
  const tel=norm(v('a-tel')), pass=v('a-pass');
  loading('Verificando...');
  const {data,error} = await sb.from('usuarios').select('*').eq('telefono',tel).eq('password',hash(pass)).single();
  if(error||!data){ renderAuth('login'); showAuthErr('Teléfono o contraseña incorrectos'); return; }
  loginUser(data);
}

async function doRegister(){
  const nombre=v('a-nombre')||'', tel=norm(v('a-tel')), pass=v('a-pass');
  if(nombre.trim().length<2){showAuthErr('Nombre muy corto');return;}
  if(tel.length<10){showAuthErr('Teléfono inválido (10 dígitos)');return;}
  if(pass.length<6){showAuthErr('Contraseña mínimo 6 caracteres');return;}
  loading('Registrando...');
  // Check if exists
  const {data:exists} = await sb.from('usuarios').select('id').eq('telefono',tel).single();
  if(exists){ renderAuth('register'); showAuthErr('Ese teléfono ya está registrado'); return; }
  const newUser = {id:uid(), nombre:nombre.trim(), telefono:tel, password:hash(pass), role:'user'};
  const {data,error} = await sb.from('usuarios').insert([newUser]).select().single();
  if(error){ renderAuth('register'); showAuthErr('Error al registrar: '+error.message); return; }
  loginUser(data);
}

async function seedAdminsIfNeeded(){
  // Insert admins if they don't exist yet
  for(const a of ADMINS){
    const tel=norm(a.telefono);
    const {data} = await sb.from('usuarios').select('id').eq('telefono',tel).single();
    if(!data){
      await sb.from('usuarios').insert([{id:uid(),nombre:a.nombre,telefono:tel,password:hash(DEFAULT_PASS),role:'admin'}]);
    }
  }
  // Seed mesa config if empty
  const {data:cfg} = await sb.from('mesas_config').select('mesa');
  if(!cfg||cfg.length===0){
    const rows = ALL_MESAS.map(m=>({mesa:m, habilitada:ENABLED_DEFAULT.has(m)}));
    await sb.from('mesas_config').insert(rows);
  }
}

function loginUser(u){ currentUser=u; sessionStorage.setItem('wb_user',JSON.stringify(u)); route(); }
function doLogout(){ currentUser=null; sessionStorage.removeItem('wb_user'); route(); }
function showAuthErr(m){ const el=document.getElementById('auth-err'); if(el) el.innerHTML=`<div class="alert alert-err" style="margin-bottom:10px">${m}</div>`; }

// ============================================================
//  MAIN SHELL
// ============================================================
function renderMain(){
  const isAdmin = currentUser.role==='admin';
  render(`
  <div>
    <div class="brand-bar">
      <div class="brand">
        <div class="logo">WB</div>
        <div>
          <div class="brand-title">World Brunch</div>
          <div class="brand-sub">GAME ON · MUNDIAL · 13 JUN 2026</div>
        </div>
      </div>
      <div class="user-chip">
        <a href="https://brunchim2026.netlify.app/" target="_blank" class="btn btn-outline btn-sm" style="font-size:10px;padding:6px 12px;">ℹ️ Info</a>
        <div>
          <strong>${currentUser.nombre}</strong>${isAdmin?'<span class="admin-badge">ADMIN</span>':''}
          <div style="font-size:10px">${currentUser.telefono}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="wrap">
      <div class="tabs">
        <button class="tab ${currentTab==='reserva'?'active':''}" onclick="switchTab('reserva')">Mi Reserva</button>
        <button class="tab ${currentTab==='mapa'?'active':''}" onclick="switchTab('mapa')">Mapa</button>
        ${isAdmin?`<button class="tab ${currentTab==='admin'?'active':''}" onclick="switchTab('admin')">Admin</button>`:''}
      </div>
      <div id="tab-content"></div>
    </div>
  </div>`);
  loadTab();
}

function switchTab(t){ currentTab=t; renderMain(); }

async function loadTab(){
  const el=document.getElementById('tab-content');
  if(!el) return;
  el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--muted)"><div style="width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite"></div> Cargando...</div>`;

  if(currentTab==='reserva') await loadReservaTab(el);
  else if(currentTab==='mapa') await loadMapaTab(el);
  else if(currentTab==='admin') await loadAdminTab(el);
}

// ============================================================
//  HELPERS
// ============================================================
function mesaClass(status, selected, isMine){
  let c='mesa-cell ';
  if(status==='deshabilitada') c+='disabled deshabilitada';
  else if(status==='ocupada') c+='ocupada';
  else if(status==='pendiente') c+='pendiente';
  else c+='libre';
  if(selected) c+=' selected';
  if(isMine) c+=' mine';
  return c;
}

// ============================================================
//  FORM STATE
// ============================================================
let formState = {step:1, esCandidato:null, mesa:null, personas:[], editing:false, editId:null};
function resetForm(){ formState={step:1,esCandidato:null,mesa:null,personas:[],editing:false,editId:null}; }

// ============================================================
//  RESERVA TAB
// ============================================================
async function loadReservaTab(el){
  // Load my active reservation
  const {data:mine} = await sb.from('reservas')
    .select('*')
    .eq('user_id', currentUser.id)
    .in('estado',['pendiente','aprobada'])
    .order('created_at',{ascending:false})
    .limit(1);
  const myRes = mine&&mine.length>0 ? mine[0] : null;

  if(myRes && !formState.editing){
    el.innerHTML = statusHTML(myRes);
  } else {
    // Load mesa statuses
    const [resData, cfgData] = await Promise.all([
      sb.from('reservas').select('mesa,estado').in('estado',['pendiente','aprobada']),
      sb.from('mesas_config').select('mesa,habilitada')
    ]);
    const reservasPorMesa = {};
    (resData.data||[]).forEach(r=>{ reservasPorMesa[r.mesa]=r.estado; });
    const cfgMap = {};
    (cfgData.data||[]).forEach(c=>{ cfgMap[c.mesa]=c.habilitada; });
    el.innerHTML = formHTML(reservasPorMesa, cfgMap);
  }
}

function statusHTML(r){
  const msgs={
    pendiente:'⏳ Tu solicitud está en revisión.',
    aprobada:'✅ Tu mesa está confirmada. ¡Nos vemos el 13 de junio!',
  };
  const alertClass={pendiente:'alert-warn',aprobada:'alert-ok'};
  const personas = Array.isArray(r.personas)?r.personas:[];
  return `
  <h1>Reserva tu mesa</h1>
  <p class="page-sub">Game On · 13 de Junio 2026 · Cover $500</p>
  <div class="card">
    <div class="req-head">
      <div>
        <div class="req-mesa">Mesa ${r.mesa}</div>
        <div class="persona-meta" style="margin-top:4px">${ZONA_MAP[r.mesa]||'—'} · ${personas.length} personas</div>
      </div>
      <span class="req-status ${r.estado}">${r.estado}</span>
    </div>
    <div class="alert ${alertClass[r.estado]||'alert-warn'}" style="margin-top:12px">${msgs[r.estado]||r.estado}</div>
    ${r.motivo_rechazo?`<div class="alert alert-err" style="margin-top:8px">Motivo: ${r.motivo_rechazo}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      ${r.estado==='pendiente'?`<button class="btn btn-outline btn-sm" onclick="startEdit(${r.id})">✎ Editar integrantes</button>`:''}
      ${r.estado==='pendiente'?`<button class="btn btn-danger btn-sm" onclick="cancelReservation(${r.id})">Cancelar solicitud</button>`:''}
    </div>
  </div>`;
}

function formHTML(reservasPorMesa, cfgMap){
  const s=formState;
  const stepsHTML=`
  <div class="steps">
    <div class="step"><div class="step-dot ${s.step===1?'active':s.step>1?'done':''}">${s.step>1?'✓':'1'}</div><div class="step-line ${s.step>1?'done':''}"></div></div>
    <div class="step"><div class="step-dot ${s.step===2?'active':s.step>2?'done':''}">${s.step>2?'✓':'2'}</div><div class="step-line ${s.step>2?'done':''}"></div></div>
    <div class="step"><div class="step-dot ${s.step===3?'active':''}">3</div></div>
  </div>`;
  let body='';
  if(s.step===1) body=step1HTML();
  else if(s.step===2) body=step2HTML(reservasPorMesa||{}, cfgMap||{});
  else body=step3HTML();
  return `<h1>${s.editing?'Editar integrantes':'Reserva tu mesa'}</h1><p class="page-sub">Game On · 13 de Junio 2026 · Cover $500</p>${stepsHTML}${body}`;
}

function step1HTML(){
  return `
  <div class="card">
    <div class="card-title">Paso 1 · Datos del responsable</div>
    <label>Nombre</label><input value="${currentUser.nombre}" disabled>
    <label>Teléfono</label><input value="${currentUser.telefono}" disabled>
    <label>¿Eres candidato a graduar?</label>
    <div class="radio-group">
      <div class="radio-opt ${formState.esCandidato===true?'active':''}" onclick="setCand(true)">✓ Sí soy candidato</div>
      <div class="radio-opt ${formState.esCandidato===false?'active':''}" onclick="setCand(false)">✗ No soy candidato</div>
    </div>
    ${formState.esCandidato===true?'<div class="alert alert-ok" style="margin-top:12px">⭐ Los candidatos no pagan cover.</div>':''}
    ${formState.esCandidato===false?'<div class="alert alert-warn" style="margin-top:12px">🎟️ Deberás pagar el cover de $500.</div>':''}
  </div>
  <button class="btn btn-primary btn-full" ${formState.esCandidato===null?'disabled':''} onclick="goStep(2)">Continuar →</button>`;
}

function step2HTML(reservasPorMesa, cfgMap){
  let zonesHTML='';
  ZONES.forEach(z=>{
    zonesHTML+=`<div class="zona-header">${z.name}</div><div class="mapa-zone">`;
    z.mesas.forEach(m=>{
      const habilitada = cfgMap[m]!==undefined ? cfgMap[m] : ENABLED_DEFAULT.has(m);
      const resEstado = reservasPorMesa[m];
      let status = 'libre';
      if(!habilitada) status='deshabilitada';
      else if(resEstado==='aprobada') status='ocupada';
      else if(resEstado==='pendiente') status='pendiente';
      const isSelected = formState.mesa===m;
      const cls = mesaClass(status, isSelected, false);
      const clickable = status==='libre';
      zonesHTML+=`<div class="${cls}" ${clickable?`onclick="selectMesa(${m})"`:''}  title="${clickable?'Seleccionar mesa '+m:status}"><span class="zt">${z.name.split(' ')[0].toUpperCase()}</span>${m}</div>`;
    });
    zonesHTML+='</div>';
  });
  return `
  <div class="card">
    <div class="card-title">Paso 2 · Elige tu mesa</div>
    <div class="alert alert-ok">👆 Toca una mesa <strong>verde</strong> para seleccionarla</div>
    <div class="legend" style="margin-top:10px">
      <div class="legend-item"><div class="ld ld-free"></div> Disponible</div>
      <div class="legend-item"><div class="ld ld-taken"></div> Ocupada</div>
      <div class="legend-item"><div class="ld ld-pend"></div> Pendiente</div>
      <div class="legend-item"><div class="ld ld-dis"></div> No disponible</div>
    </div>
    ${zonesHTML}
    ${formState.mesa?`<div class="alert alert-ok" style="margin-top:12px">Mesa seleccionada: <strong>${formState.mesa}</strong> — ${ZONA_MAP[formState.mesa]}</div>`:'<div class="alert alert-warn" style="margin-top:10px">Ninguna mesa seleccionada.</div>'}
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-outline" onclick="goStep(1)">← Atrás</button>
    <button class="btn btn-primary" style="flex:1" ${!formState.mesa?'disabled':''} onclick="goStep(3)">Continuar →</button>
  </div>`;
}

function step3HTML(){
  const ps=formState.personas; const total=ps.length;
  const pct=Math.min(100,(total/12)*100);
  let listHTML=ps.length?ps.map((p,i)=>`
    <div class="persona-row">
      <div style="flex:1">
        <div class="persona-name">${p.nombre}</div>
        <div class="persona-meta">
          <span class="badge ${p.tipo}">${p.tipo==='paga'?'Pagó':'Candidato'}</span>
          ${p.pagoRef?`<span style="margin-left:7px">· ${p.pagoRef}</span>`:''}
        </div>
        ${p.comprobante?`<img src="${p.comprobante}" class="comp-thumb" onclick="showImg('${p.comprobante.substring(0,30)}...')">`:''}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="removePersona(${i})">✕</button>
    </div>`).join(''):`<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px 0">Sin personas aún.</div>`;
  return `
  <div class="card">
    <div class="card-title">Paso 3 · Integrantes de la mesa</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:var(--muted)">PERSONAS REGISTRADAS</span>
      <span style="font-size:26px;font-weight:700;color:var(--gold)">${total}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px"><span>0</span><span style="color:var(--gold)">mín 8</span><span>12</span></div>
    <hr>
    <div class="card-title">Agregar persona</div>
    <div class="row2">
      <div><label>Nombre</label><input id="pn" placeholder="Nombre completo"></div>
      <div><label>Tipo</label>
        <select id="pt" onchange="togglePagoField()">
          <option value="">— Selecciona —</option>
          <option value="paga">✓ Pagó cover</option>
          <option value="candidato">⭐ Candidato a graduar</option>
        </select>
      </div>
    </div>
    <div id="pago-fields" style="display:none">
      <label>Referencia de pago</label>
      <input id="pref" placeholder="Ref. Moneypool o número de comprobante">
      <label>Comprobante de pago (imagen)</label>
      <label class="file-label" for="pimg">📎 Toca aquí para adjuntar imagen<input id="pimg" type="file" accept="image/*" onchange="previewComp(this)"></label>
      <img id="comp-preview" style="display:none" class="img-preview">
    </div>
    <div id="p-err"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="addPersona()">+ Agregar persona</button>
    <hr>
    <div id="personas-list">${listHTML}</div>
    ${total<8&&total>0?'<div class="alert alert-warn" style="margin-top:10px">⚠️ Necesitas al menos 8 personas.</div>':''}
    <div id="submit-err"></div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-outline" onclick="${formState.editing?'cancelEdit()':'goStep(2)'}">← Atrás</button>
    <button class="btn btn-primary" style="flex:1" ${total<8?'disabled':''} onclick="submitReservation()">
      ${formState.editing?'💾 Guardar cambios':'📨 Enviar solicitud'}
    </button>
  </div>`;
}

// ============================================================
//  FORM ACTIONS
// ============================================================
function setCand(val){ formState.esCandidato=val; loadTab(); }
function selectMesa(m){ formState.mesa=m; loadTab(); }
function goStep(s){ formState.step=s; loadTab(); }
function cancelEdit(){ formState.editing=false; formState.editId=null; loadTab(); }

let pendingCompBase64=null;
function togglePagoField(){
  const t=v('pt'); const pf=document.getElementById('pago-fields');
  if(pf) pf.style.display=t==='paga'?'block':'none';
  if(t!=='paga') pendingCompBase64=null;
}
function previewComp(input){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingCompBase64=e.target.result;
    const img=document.getElementById('comp-preview');
    if(img){img.src=e.target.result;img.style.display='block';}
  };
  reader.readAsDataURL(input.files[0]);
}
function addPersona(){
  const nombre=v('pn'), tipo=v('pt'), pref=v('pref');
  const errEl=document.getElementById('p-err');
  if(!nombre||!tipo){if(errEl)errEl.innerHTML='<div class="alert alert-err">Nombre y tipo son obligatorios.</div>';return;}
  if(tipo==='paga'&&!pref&&!pendingCompBase64){if(errEl)errEl.innerHTML='<div class="alert alert-err">Agrega referencia o comprobante.</div>';return;}
  if(formState.personas.length>=MAX_P){if(errEl)errEl.innerHTML='<div class="alert alert-err">Máximo 12 personas.</div>';return;}
  if(errEl)errEl.innerHTML='';
  formState.personas.push({nombre,tipo,pagoRef:pref,comprobante:pendingCompBase64||null});
  pendingCompBase64=null;
  loadTab();
}
function removePersona(i){ formState.personas.splice(i,1); loadTab(); }

async function submitReservation(){
  const errEl=document.getElementById('submit-err');
  if(formState.personas.length<MIN_P){if(errEl)errEl.innerHTML='<div class="alert alert-err">Mínimo 8 personas.</div>';return;}
  if(errEl)errEl.innerHTML='';
  const btn=document.querySelector('.btn-primary[onclick="submitReservation()"]');
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}

  if(formState.editing && formState.editId){
    const {error} = await sb.from('reservas').update({
      personas: formState.personas,
      updated_at: new Date().toISOString()
    }).eq('id', formState.editId);
    if(error){if(errEl)errEl.innerHTML='<div class="alert alert-err">Error al guardar: '+error.message+'</div>';if(btn){btn.disabled=false;btn.textContent='💾 Guardar cambios';}return;}
  } else {
    // Check mesa still free
    const {data:taken} = await sb.from('reservas').select('id').eq('mesa',formState.mesa).in('estado',['pendiente','aprobada']).single();
    if(taken){if(errEl)errEl.innerHTML='<div class="alert alert-err">Esa mesa ya fue reservada. Elige otra.</div>';formState.step=2;if(btn){btn.disabled=false;}loadTab();return;}
    const {error} = await sb.from('reservas').insert([{
      user_id: currentUser.id,
      nombre: currentUser.nombre,
      telefono: currentUser.telefono,
      mesa: formState.mesa,
      zona: ZONA_MAP[formState.mesa]||'',
      personas: formState.personas,
      es_candidato: formState.esCandidato,
      estado: 'pendiente',
      fecha: new Date().toLocaleDateString('es-MX'),
      hora: new Date().toLocaleTimeString('es-MX'),
    }]);
    if(error){if(errEl)errEl.innerHTML='<div class="alert alert-err">Error al enviar: '+error.message+'</div>';if(btn){btn.disabled=false;btn.textContent='📨 Enviar solicitud';}return;}
  }
  resetForm();
  loadTab();
}

async function cancelReservation(id){
  if(!confirm('¿Cancelar tu solicitud?')) return;
  await sb.from('reservas').delete().eq('id',id);
  resetForm(); loadTab();
}

async function startEdit(id){
  const {data} = await sb.from('reservas').select('*').eq('id',id).single();
  if(!data) return;
  formState={step:3,esCandidato:data.es_candidato,mesa:data.mesa,personas:Array.isArray(data.personas)?[...data.personas]:[],editing:true,editId:id};
  loadTab();
}

// ============================================================
//  MAPA TAB

async function loadMapaTab(el){
  const [resData,cfgData] = await Promise.all([
    sb.from('reservas').select('mesa,estado,personas').in('estado',['pendiente','aprobada']),
    sb.from('mesas_config').select('mesa,habilitada')
  ]);
  const reservasPorMesa={};
  (resData.data||[]).forEach(r=>{ reservasPorMesa[r.mesa]={estado:r.estado,personas:r.personas||[]}; });
  const cfgMap={};
  (cfgData.data||[]).forEach(c=>{ cfgMap[c.mesa]=c.habilitada; });

  const libres = ALL_MESAS.filter(m=>{const h=cfgMap[m]!==undefined?cfgMap[m]:ENABLED_DEFAULT.has(m);return h&&!reservasPorMesa[m];}).length;
  const ocupadas = Object.values(reservasPorMesa).filter(r=>r.estado==='aprobada').length;
  const pendientes = Object.values(reservasPorMesa).filter(r=>r.estado==='pendiente').length;

  let zonesHTML='';
  ZONES.forEach(z=>{
    zonesHTML+=`<div class="zona-header">${z.name}</div><div class="mapa-zone">`;
    z.mesas.forEach(m=>{
      const hab=cfgMap[m]!==undefined?cfgMap[m]:ENABLED_DEFAULT.has(m);
      const res=reservasPorMesa[m];
      let status='libre';
      if(!hab) status='deshabilitada';
      else if(res?.estado==='aprobada') status='ocupada';
      else if(res?.estado==='pendiente') status='pendiente';
      const cls=mesaClass(status,false,false);
      zonesHTML+=`<div class="${cls}" onclick="showMapaDetail(${m})" title="${ZONA_MAP[m]}"><span class="zt">${z.name.split(' ')[0].toUpperCase()}</span>${m}</div>`;
    });
    zonesHTML+='</div>';
  });

  el.innerHTML=`
  <h1>Mapa de mesas</h1>
  <p class="page-sub">Disponibilidad en tiempo real</p>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num g">${libres}</div><div class="stat-lbl">Disponibles</div></div>
    <div class="stat-card"><div class="stat-num r">${ocupadas}</div><div class="stat-lbl">Ocupadas</div></div>
    <div class="stat-card"><div class="stat-num gold">${pendientes}</div><div class="stat-lbl">Pendientes</div></div>
  </div>
  <div class="card">
    <div class="card-title">Mapa del salón</div>
    <div class="legend">
      <div class="legend-item"><div class="ld ld-free"></div> Disponible</div>
      <div class="legend-item"><div class="ld ld-taken"></div> Ocupada</div>
      <div class="legend-item"><div class="ld ld-pend"></div> Pendiente</div>
      <div class="legend-item"><div class="ld ld-dis"></div> No disponible</div>
    </div>
    ${zonesHTML}
  </div>
  <div id="mapa-detail"></div>`;
}

function showMapaDetail(m){
  // Re-fetch on click
  sb.from('reservas').select('estado,personas,nombre').eq('mesa',m).in('estado',['pendiente','aprobada']).single().then(({data:res})=>{
    const det=document.getElementById('mapa-detail');
    if(!det) return;
    let body='';
    if(res?.estado==='aprobada') body=`<div class="alert alert-err">Mesa ocupada · ${(res.personas||[]).length} personas · Resp: ${res.nombre}</div>`;
    else if(res?.estado==='pendiente') body=`<div class="alert alert-warn">⏳ Solicitud en revisión · ${(res.personas||[]).length} personas</div>`;
    else body=`<div class="alert alert-ok">✅ Disponible — puedes reservarla.</div>`;
    det.innerHTML=`<div class="card"><div class="card-title">Mesa ${m} · ${ZONA_MAP[m]||'—'}</div>${body}</div>`;
  });
}

let adminFilter='todas';
async function loadAdminTab(el){
  const [resData,cfgData] = await Promise.all([
    sb.from('reservas').select('*').order('created_at',{ascending:false}),
    sb.from('mesas_config').select('mesa,habilitada')
  ]);
  const all = resData.data||[];
  const cfgMap={};
  (cfgData.data||[]).forEach(c=>{ cfgMap[c.mesa]=c.habilitada; });

  const pend=all.filter(r=>r.estado==='pendiente').length;
  const aprov=all.filter(r=>r.estado==='aprobada').length;
  const rech=all.filter(r=>r.estado==='rechazada').length;
  const filtered=adminFilter==='todas'?all:all.filter(r=>r.estado===adminFilter);

  let cfgHTML='';
  ZONES.forEach(z=>{
    cfgHTML+=`<div class="zona-header">${z.name}</div><div class="mapa-zone">`;
    z.mesas.forEach(m=>{
      const hab=cfgMap[m]!==undefined?cfgMap[m]:ENABLED_DEFAULT.has(m);
      cfgHTML+=`<div class="mesa-cell ${hab?'libre':'toggle-off'}" onclick="toggleTable(${m})" title="${hab?'Deshabilitar':'Habilitar'}"><span class="zt">${z.name.split(' ')[0].toUpperCase()}</span>${m}</div>`;
    });
    cfgHTML+='</div>';
  });

  const reqsHTML=filtered.length===0
    ?'<div class="card" style="text-align:center;color:var(--muted)">Sin solicitudes</div>'
    :filtered.map(r=>reqRowHTML(r)).join('');

  el.innerHTML=`
  <h1>Panel Admin</h1>
  <p class="page-sub">Gestión de mesas · World Brunch Mecánica</p>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num gold">${pend}</div><div class="stat-lbl">Pendientes</div></div>
    <div class="stat-card"><div class="stat-num g">${aprov}</div><div class="stat-lbl">Aprobadas</div></div>
    <div class="stat-card"><div class="stat-num r">${rech}</div><div class="stat-lbl">Rechazadas</div></div>
  </div>
  <div class="card">
    <div class="card-title">Habilitar / deshabilitar mesas</div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:12px">Toca una mesa para alternar disponibilidad.</p>
    ${cfgHTML}
  </div>
  <h2>Solicitudes</h2>
  <div class="filter-bar">
    ${['todas','pendiente','aprobada','rechazada'].map(f=>`<button class="btn btn-outline btn-sm ${adminFilter===f?'active':''}" onclick="setAdminFilter('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
  </div>
  ${reqsHTML}`;
}

          ${p.pagoRef?`<span style="margin-left:7px">· ${p.pagoRef}</span>`:''}
        </div>
        ${p.comprobante?`<img src="${p.comprobante}" class="comp-thumb" style="max-height:80px">

  const waAprobado=waLink(r.telefono,`Hola ${r.nombre}, tu solicitud para Mesa ${r.mesa} en World Brunch Mecánica fue APROBADA ✅. ¡Nos vemos el 13 de junio en The Normal!`);

  const waRevision=waLink(r.telefono,`Hola ${r.nombre}, tu solicitud para Mesa ${r.mesa} está en revisión. Te avisamos pronto.`);

  return `
  <div class="req-row">
    <div class="req-head">
      <div>
        <div class="req-mesa">Mesa ${r.mesa}</div>
        <div class="persona-meta">${ZONA_MAP[r.mesa]||'—'}</div>
        <div style="margin-top:6px;font-size:13px"><strong>${r.nombre}</strong> <span style="color:var(--muted);margin-left:8px">${r.telefono}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${new Date(r.created_at).toLocaleString('es-MX')}</div>
      </div>
      <span class="req-status ${r.estado}">${r.estado}</span>
    </div>
    <div style="margin-top:12px">
      <div style="font-size:11px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px">INTEGRANTES (${personas.length})</div>
      ${personasHTML}
    </div>
    ${r.motivo_rechazo?`<div class="alert alert-err" style="margin-top:10px">Motivo: ${r.motivo_rechazo}</div>`:''}
    <div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap">
      ${r.estado==='pendiente'?`
        <button class="btn btn-primary btn-sm" onclick="approveReq(${r.id})">✓ Aprobar</button>
        <button class="btn btn-danger btn-sm" onclick="openRejectModal(${r.id},'${r.mesa}')">✕ Rechazar</button>`:''}
      ${r.estado==='aprobada'?`<button class="btn btn-danger btn-sm" onclick="revokeReq(${r.id})">Revocar</button>`:''}
      <a class="btn btn-wa btn-sm" href="${r.estado==='aprobada'?waAprobado:r.estado==='rechazada'?waRechazado:waRevision}" target="_blank">💬 WhatsApp</a>
    </div>
  </div>`;
}

function setAdminFilter(f){ adminFilter=f; loadTab(); }

async function toggleTable(m){
  const {data:current} = await sb.from('mesas_config').select('habilitada').eq('mesa',m).single();
  const newVal = current ? !current.habilitada : !ENABLED_DEFAULT.has(m);
  await sb.from('mesas_config').upsert({mesa:m, habilitada:newVal});
  loadTab();
}

async function approveReq(id){
  await sb.from('reservas').update({estado:'aprobada',updated_at:new Date().toISOString()}).eq('id',id);
  loadTab();
}
async function revokeReq(id){
  await sb.from('reservas').update({estado:'rechazada',motivo_rechazo:'Revocada por admin',updated_at:new Date().toISOString()}).eq('id',id);
  loadTab();
}

let rejectTarget=null;
function openRejectModal(id,mesa){
  rejectTarget=id;
  const bd=document.createElement('div');
  bd.className='modal-backdrop'; bd.id='reject-modal';
  bd.innerHTML=`
  <div class="modal">
    <div class="card-title">Rechazar Mesa ${mesa}</div>
    <label>Motivo del rechazo</label>
    <textarea id="reject-motivo" rows="3" placeholder="Falta de pagos, capacidad, etc."></textarea>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="closeRejectModal()">Cancelar</button>
      <button class="btn btn-danger" style="flex:1" onclick="confirmReject()">Rechazar</button>
    </div>
  </div>`;
  document.body.appendChild(bd);
}
function closeRejectModal(){ const m=document.getElementById('reject-modal'); if(m)m.remove(); rejectTarget=null; }
async function confirmReject(){
  if(!rejectTarget) return;
  const motivo=document.getElementById('reject-motivo')?.value?.trim()||'';
  await sb.from('reservas').update({estado:'rechazada',motivo_rechazo:motivo,updated_at:new Date().toISOString()}).eq('id',rejectTarget);
  closeRejectModal(); loadTab();
}

function showImg(src){
  const bd=document.createElement('div');
  bd.className='modal-backdrop'; bd.onclick=()=>bd.remove();
  bd.innerHTML=`<div style="max-width:90vw;max-height:90vh"><img src="${src}" style="max-width:100%;max-height:85vh;border-radius:10px;border:1px solid var(--border)"><div style="text-align:center;margin-top:10px"><button class="btn btn-outline btn-sm" onclick="this.closest('.modal-backdrop').remove()">Cerrar</button></div></div>`;
  document.body.appendChild(bd);
}

(async ()=>{
  loading('Iniciando...');
  await seedAdminsIfNeeded();
  route();
})();
</script>
